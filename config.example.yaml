network:
  clash_verge:
    app_home: ""
    route_check_target: "1.1.1.1"
    tun_interface_prefix: "utun"
  egress_ip:
    expected_ip: "203.0.113.10"
    host_check_url: "https://api.ipify.org"
    sandbox_check_url: "https://api.ipify.org"
    timeout_seconds: 30

sandbox:
  backend: "docker-sandbox"
  main_name: "claude-sbx"
  probe_name: "claude-sbx-probe"
  agent: "claude"
  template: "safe-claude-sbx-herdr:latest"
  supervision:
    mode: "sandbox-local-herdr"
    herdr:
      install_if_missing: false
      socket_path: "/home/agent/.config/herdr/herdr.sock"
      pane_id: "sandbox-claude"

workspace:
  mount: "."
  use_clone_mode: false
  forbidden_paths:
    - "~"
    - "~/.ssh"
    - "~/.claude"
    - "~/.config/clash"
    - "~/Library/Application Support/io.github.clash-verge-rev.clash-verge-rev"
    - "~/Library/Keychains"
    - "/Library/Keychains"

environment:
  timezone: "America/Chicago"
  locale: "en_US.UTF-8"
  allow_ssh_agent_forwarding: false
  forbidden_env_vars:
    - OPENAI_API_KEY
    - ANTHROPIC_API_KEY
    - CLAUDE_API_KEY
    - SSH_AUTH_SOCK
    - SSH_AUTH_SOCK_GATEWAY
    - SSH_AGENT_PID
    - HTTP_PROXY
    - HTTPS_PROXY
    - ALL_PROXY
    - NO_PROXY
    - http_proxy
    - https_proxy
    - all_proxy
    - no_proxy
    - HERDR_ENV
    - HERDR_PANE_ID
    - HERDR_SOCKET_PATH
    - HERDR_TAB_ID
    - HERDR_WORKSPACE_ID

watchdog:
  enabled: true
  log_level: "info"
  log_file: ""

cleanup:
  stop_main_sandbox: true
  remove_probe_sandbox: true
  remove_main_sandbox: false
